<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <title>DIGITAL ID V0.2.1</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&family=Rajdhani:wght@500;700&display=swap');

        :root {
            --neon-cyan: #00f2ff;
            --neon-red: #ff003c;
            --dark-void: #020205;
        }

        body {
            background-color: var(--dark-void);
            color: var(--neon-cyan);
            font-family: 'Rajdhani', sans-serif;
            overflow-x: hidden;
        }

        /* NEON RED WARNING OVERLAY */
        #construction-overlay {
            position: fixed;
            inset: 0;
            z-index: 200;
            background: rgba(2, 2, 5, 0.98);
            display: flex;
            align-items: center;
            justify-content: center;
            backdrop-filter: blur(15px);
        }

        .hazard-triangle {
            width: 0;
            height: 0;
            border-left: 50px solid transparent;
            border-right: 50px solid transparent;
            border-bottom: 80px solid var(--neon-red);
            position: relative;
            filter: drop-shadow(0 0 15px var(--neon-red));
            margin-bottom: 20px;
            animation: flicker 2s infinite;
        }

        .hazard-triangle::after {
            content: "!";
            position: absolute;
            left: -5px;
            top: 30px;
            font-family: 'Orbitron';
            font-weight: bold;
            color: white;
            font-size: 35px;
        }

        @keyframes flicker {
            0%, 19.999%, 22%, 62.999%, 64%, 100% { opacity: 1; }
            20%, 21.999%, 63%, 63.999% { opacity: 0.4; }
        }

        @keyframes pulse-border {
            0% { border-color: rgba(0, 242, 255, 0.2); box-shadow: 0 0 5px rgba(0, 242, 255, 0.1); }
            50% { border-color: rgba(0, 242, 255, 0.8); box-shadow: 0 0 15px rgba(0, 242, 255, 0.3); }
            100% { border-color: rgba(0, 242, 255, 0.2); box-shadow: 0 0 5px rgba(0, 242, 255, 0.1); }
        }

        .animate-pulse-slow { animation: pulse-border 3s infinite ease-in-out; }
        
        .stagger-in > * { opacity: 0; transform: translateY(20px); animation: slideUp 0.5s forwards; }
        .stagger-in > *:nth-child(1) { animation-delay: 0.1s; }
        .stagger-in > *:nth-child(2) { animation-delay: 0.2s; }

        @keyframes slideUp { to { opacity: 1; transform: translateY(0); } }

        .hex-btn { clip-path: polygon(10% 0%, 100% 0%, 90% 100%, 0% 100%); }
        .menu-tab { clip-path: polygon(0 0, 100% 0, 85% 100%, 15% 100%); }
        .octo-badge { clip-path: polygon(20% 0%, 80% 0%, 100% 20%, 100% 80%, 80% 100%, 20% 100%, 0% 80%, 0% 20%); }

        .hidden-menu { 
            opacity: 0 !important; 
            pointer-events: none; 
            transform: scale(1.1);
            filter: blur(20px);
            visibility: hidden !important;
        }

        .no-scrollbar::-webkit-scrollbar { display: none; }
    </style>
</head>
<body class="pb-28 lg:pb-0">

    <div id="construction-overlay">
        <div class="max-w-md w-full p-10 border-2 border-red-600/50 text-center bg-red-950/10 shadow-[0_0_50px_rgba(255,0,60,0.15)] mx-4">
            <div class="flex justify-center"><div class="hazard-triangle"></div></div>
            <h2 class="text-red-500 font-bold text-5xl mb-6 tracking-tighter" style="font-family: 'Orbitron';">WARNING</h2>
            <p class="text-white font-mono text-xs mb-8 uppercase tracking-[0.2em] leading-loose opacity-80">
                The website you're currently visiting is under <span class="text-red-500 font-bold">heavy construction</span>. 
                Please report if you encounter any bugs in the neural link.
            </p>
            <button onclick="dismissWarning()" class="w-full bg-red-600 text-white px-10 py-4 font-black uppercase tracking-widest hover:bg-white hover:text-red-600 transition-all shadow-[0_0_20px_rgba(255,0,60,0.4)]">
                I Understand
            </button>
        </div>
    </div>

    <audio id="bg-music" loop>
        <source src="terminal_ascent.mp3" type="audio/mpeg">
    </audio>

    <div id="home-menu" class="fixed inset-0 z-[100] bg-black/95 backdrop-blur-2xl flex flex-col items-center justify-center p-6 text-center transition-all duration-700">
        <div class="mb-8 relative">
            <div class="absolute inset-0 border-2 border-cyan-500/20 rounded-full animate-spin [animation-duration:10s]"></div>
            <div class="w-24 h-24 octo-badge bg-cyan-500/10 border border-cyan-500 flex items-center justify-center mx-auto mb-4 animate-pulse">
                <i class="fa-solid fa-microchip text-4xl"></i>
            </div>
            <h1 class="text-4xl lg:text-6xl font-bold tracking-[0.3em] text-white italic" style="font-family: 'Orbitron';">WELCOME</h1>
            <p class="text-cyan-500 text-xs tracking-widest mt-2 uppercase opacity-60 font-mono">System Status: <span class="text-green-400">OPTIMAL</span></p>
        </div>

        <div class="flex flex-col gap-6 w-full max-w-xs stagger-in">
            <button onclick="closeMenu()" class="menu-tab bg-cyan-500 text-black py-5 font-black uppercase tracking-widest hover:bg-white hover:scale-105 transition-all">
               Access Interface
            </button>
            <button class="menu-tab bg-black border border-cyan-900 text-cyan-400/60 py-3 font-bold uppercase text-sm hover:border-cyan-500 transition-all">
                Satellite Uplink
            </button>
        </div>
    </div>

    <header class="flex justify-between items-center p-4 bg-black border-b border-cyan-900/50 sticky top-0 z-50 lg:px-12">
        <button onclick="openMenu()" class="octo-badge bg-cyan-950/40 w-10 h-10 flex items-center justify-center border border-cyan-500/30 active:scale-90 transition-transform">
            <i class="fa-solid fa-bars-staggered"></i>
        </button>
        <div class="flex flex-col items-center">
            <span class="text-[8px] tracking-[3px] text-cyan-500 opacity-50 uppercase font-mono">Signal_Strength</span>
            <div class="flex gap-1 items-center">
                <div class="w-1 h-2 bg-cyan-500"></div><div class="w-1 h-2 bg-cyan-500"></div><div class="w-1 h-2 bg-cyan-500/30"></div>
                <button onclick="toggleMute()" class="ml-2 text-cyan-500/50 hover:text-cyan-400">
                    <i id="mute-icon" class="fa-solid fa-volume-high text-[10px]"></i>
                </button>
            </div>
        </div>
        <button class="octo-badge bg-cyan-950/40 w-10 h-10 flex items-center justify-center border border-cyan-500/30">
            <i class="fa-solid fa-share-nodes"></i>
        </button>
    </header>

    <main class="lg:grid lg:grid-cols-2 lg:h-[calc(100vh-160px)] lg:max-w-7xl lg:mx-auto">
        
        <div class="relative w-full aspect-square lg:aspect-auto lg:h-full bg-black border-r border-cyan-900/20 group overflow-hidden">
            <div id="slider" class="flex overflow-x-auto snap-x snap-mandatory no-scrollbar h-full">
                <div class="min-w-full h-full snap-center">
                    <img src="https://i.postimg.cc/jq48Cnq4/IMG-20260328-214557.jpg" class="w-full h-full object-cover grayscale-[40%] group-hover:grayscale-0 transition-all duration-1000">
                </div>
                <div class="min-w-full h-full snap-center">
                    <img src="https://i.postimg.cc/y8QtxgPf/RDT-20260329-1808341154363770606799191.webp" class="w-full h-full object-cover grayscale-[40%] group-hover:grayscale-0 transition-all duration-1000">
                </div>
            </div>
            <div class="absolute bottom-0 left-0 w-full h-[4px] bg-cyan-900/30">
                <div id="progress-bar" class="h-full bg-cyan-500 shadow-[0_0_15px_#00f2ff] transition-all duration-300" style="width: 50%;"></div>
            </div>
            <div class="absolute top-4 left-4 bg-black/80 backdrop-blur-md px-3 py-1 font-mono text-[10px] border border-cyan-500/30">
                IMG_SEQ://<span id="counter">1/2</span>
            </div>
        </div>

        <div class="p-6 lg:p-16 flex flex-col justify-center">
            <div class="animate-pulse-slow border-l-4 border-cyan-500 pl-6 mb-8 bg-gradient-to-r from-cyan-500/10 to-transparent py-4">
                <h1 class="text-4xl lg:text-5xl font-bold text-white uppercase tracking-tighter mb-2" style="font-family: 'Orbitron';">Early Access</h1>
                <p class="text-cyan-400 font-black text-2xl italic tracking-widest">FREE_ACCESS</p>
            </div>

            <div class="grid grid-cols-1 gap-4 text-xs font-mono">
                <div class="bg-cyan-950/10 p-5 flex justify-between items-center border border-cyan-900/30">
                    <span class="opacity-50 uppercase flex items-center gap-2"><i class="fa-solid fa-location-crosshairs"></i> Coordinates</span>
                    <span class="text-white font-bold tracking-widest">GLOBAL</span>
                </div>
                <div class="bg-cyan-950/10 p-5 flex justify-between items-center border border-cyan-900/30">
                    <span class="opacity-50 uppercase flex items-center gap-2"><i class="fa-solid fa-clock-rotate-left"></i> Last Sync</span>
                    <span class="text-white font-bold uppercase">Active</span>
                </div>
            </div>
        </div>
    </main>

    <footer class="fixed bottom-0 left-0 right-0 bg-black/95 p-4 border-t border-cyan-900/50 flex items-center justify-between z-50 backdrop-blur-lg lg:px-12 lg:h-24">
        <div class="flex items-center gap-4">
            <div class="w-14 h-14 octo-badge bg-cyan-900/20 border border-cyan-500/50 flex items-center justify-center">
                <i class="fa-solid fa-ghost text-cyan-400 text-xl"></i>
            </div>
            <div>
                <p class="text-[9px] opacity-40 font-mono tracking-tighter">DATA_NODE</p>
                <p class="text-lg font-bold text-white tracking-widest uppercase">IyadKh</p>
            </div>
        </div>
        
        <div class="flex gap-4">
            <a href="#" class="hex-btn bg-black border border-cyan-900 w-14 h-14 flex items-center justify-center text-cyan-400 hover:text-white transition-all">
                <i class="fa-brands fa-whatsapp text-2xl"></i>
            </a>
            <a href="#" class="hex-btn bg-cyan-500 text-black px-12 h-14 flex items-center gap-3 font-black uppercase tracking-tighter hover:bg-white transition-all">
                <i class="fa-solid fa-bolt-lightning animate-bounce"></i> Establish
            </a>
        </div>
    </footer>

    <script>
        const slider = document.getElementById('slider');
        const counter = document.getElementById('counter');
        const homeMenu = document.getElementById('home-menu');
        const progressBar = document.getElementById('progress-bar');
        const bgMusic = document.getElementById('bg-music');
        const muteIcon = document.getElementById('mute-icon');

        slider.addEventListener('scroll', () => {
            const index = Math.round(slider.scrollLeft / slider.clientWidth) + 1;
            counter.innerText = `${index}/2`;
            const scrollPercent = (index / 2) * 100;
            progressBar.style.width = `${scrollPercent}%`;
        });

        function dismissWarning() {
            const overlay = document.getElementById('construction-overlay');
            overlay.style.opacity = '0';
            setTimeout(() => overlay.style.display = 'none', 500);
        }

        function closeMenu() {
            homeMenu.classList.add('hidden-menu');
            bgMusic.volume = 0.3;
            bgMusic.play().catch(e => {});
        }

        function openMenu() {
            homeMenu.classList.remove('hidden-menu');
        }

        function toggleMute() {
            bgMusic.muted = !bgMusic.muted;
            muteIcon.classList.toggle('fa-volume-high', !bgMusic.muted);
            muteIcon.classList.toggle('fa-volume-xmark', bgMusic.muted);
        }
    </script>
</body>
</html>
