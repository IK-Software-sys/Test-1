<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <title>NEURAL_INTERFACE_V5</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&family=Rajdhani:wght@500;700&display=swap');

        :root {
            --neon-cyan: #00f2ff;
            --dark-void: #020205;
        }

        body {
            background-color: var(--dark-void);
            color: var(--neon-cyan);
            font-family: 'Rajdhani', sans-serif;
            overflow-x: hidden;
        }

        /* --- Animations --- */
        @keyframes pulse-border {
            0% { border-color: rgba(0, 242, 255, 0.2); box-shadow: 0 0 5px rgba(0, 242, 255, 0.1); }
            50% { border-color: rgba(0, 242, 255, 0.8); box-shadow: 0 0 15px rgba(0, 242, 255, 0.3); }
            100% { border-color: rgba(0, 242, 255, 0.2); box-shadow: 0 0 5px rgba(0, 242, 255, 0.1); }
        }

        @keyframes glitch-skew {
            0% { transform: skew(0deg); }
            20% { transform: skew(2deg); opacity: 0.8; }
            21% { transform: skew(-5deg); }
            25% { transform: skew(0deg); opacity: 1; }
            100% { transform: skew(0deg); }
        }

        .animate-pulse-slow { animation: pulse-border 3s infinite ease-in-out; }
        .glitch-hover:hover { animation: glitch-skew 0.3s infinite linear; }
        
        .stagger-in > * { opacity: 0; transform: translateY(20px); animation: slideUp 0.5s forwards; }
        .stagger-in > *:nth-child(1) { animation-delay: 0.1s; }
        .stagger-in > *:nth-child(2) { animation-delay: 0.2s; }
        .stagger-in > *:nth-child(3) { animation-delay: 0.3s; }

        @keyframes slideUp {
            to { opacity: 1; transform: translateY(0); }
        }

        /* Geometric Shapes */
        .hex-btn { clip-path: polygon(10% 0%, 100% 0%, 90% 100%, 0% 100%); }
        .menu-tab { clip-path: polygon(0 0, 100% 0, 85% 100%, 15% 100%); }
        .octo-badge { clip-path: polygon(20% 0%, 80% 0%, 100% 20%, 100% 80%, 80% 100%, 20% 100%, 0% 80%, 0% 20%); }

        /* FIXED MENU LOGIC */
        #home-menu { 
            transition: all 0.6s cubic-bezier(0.85, 0, 0.15, 1); 
            visibility: visible;
            opacity: 1;
        }

        .hidden-menu { 
            opacity: 0 !important; 
            pointer-events: none; 
            transform: scale(1.1) translateY(-20px);
            filter: blur(20px);
            visibility: hidden !important;
        }

        .no-scrollbar::-webkit-scrollbar { display: none; }
    </style>
</head>
<body class="pb-28">

    <div id="home-menu" class="fixed inset-0 z-[100] bg-black/95 backdrop-blur-2xl flex flex-col items-center justify-center p-6 text-center">
        <div class="mb-8 relative">
            <div class="absolute inset-0 border-2 border-cyan-500/20 rounded-full animate-spin [animation-duration:10s]"></div>
            <div class="w-24 h-24 octo-badge bg-cyan-500/10 border border-cyan-500 flex items-center justify-center mx-auto mb-4 animate-pulse">
                <i class="fa-solid fa-microchip text-4xl"></i>
            </div>
            <h1 class="text-4xl font-bold tracking-[0.3em] text-white italic glitch-hover" style="font-family: 'Orbitron';">IK_OS</h1>
            <p class="text-cyan-500 text-xs tracking-widest mt-2 uppercase opacity-60 font-mono">System Status: <span class="text-green-400">OPTIMAL</span></p>
        </div>

        <div class="flex flex-col gap-6 w-full max-w-xs stagger-in">
            <button onclick="closeMenu()" class="menu-tab bg-cyan-500 text-black py-5 font-black uppercase tracking-widest hover:bg-white hover:scale-105 transition-all shadow-[0_0_20px_rgba(0,242,255,0.4)]">
                Access Classified
            </button>
            <button class="menu-tab bg-black border border-cyan-900 text-cyan-400/60 py-3 font-bold uppercase text-sm hover:border-cyan-500 hover:text-cyan-400 transition-all">
                Satellite Uplink
            </button>
            <button class="menu-tab bg-black border border-cyan-900 text-cyan-400/60 py-3 font-bold uppercase text-sm hover:border-cyan-500 hover:text-cyan-400 transition-all">
                Node Settings
            </button>
        </div>
    </div>

    <div class="flex justify-between items-center p-4 bg-black border-b border-cyan-900/50 sticky top-0 z-50">
        <button onclick="openMenu()" class="octo-badge bg-cyan-950/40 w-10 h-10 flex items-center justify-center border border-cyan-500/30 active:scale-90 transition-transform">
            <i class="fa-solid fa-bars-staggered"></i>
        </button>
        <div class="flex flex-col items-center">
            <span class="text-[8px] tracking-[3px] text-cyan-500 opacity-50 uppercase font-mono">Signal_Strength</span>
            <div class="flex gap-1">
                <div class="w-1 h-2 bg-cyan-500"></div>
                <div class="w-1 h-2 bg-cyan-500"></div>
                <div class="w-1 h-2 bg-cyan-500/30"></div>
            </div>
        </div>
        <button class="octo-badge bg-cyan-950/40 w-10 h-10 flex items-center justify-center border border-cyan-500/30">
            <i class="fa-solid fa-share-nodes"></i>
        </button>
    </div>

    <div class="relative w-full aspect-square bg-black group">
        <div id="slider" class="flex overflow-x-auto snap-x snap-mandatory no-scrollbar h-full">
            <div class="min-w-full h-full snap-center">
                <img src="https://i.postimg.cc/jq48Cnq4/IMG-20260328-214557.jpg" class="w-full h-full object-cover grayscale-[20%] group-hover:grayscale-0 transition-all duration-700">
            </div>
            <div class="min-w-full h-full snap-center">
                <img src="https://i.postimg.cc/y8QtxgPf/RDT-20260329-1808341154363770606799191.webp" class="w-full h-full object-cover grayscale-[20%] group-hover:grayscale-0 transition-all duration-700">
            </div>
        </div>
        <div class="absolute bottom-0 left-0 w-full h-[2px] bg-cyan-900/30">
            <div id="progress-bar" class="h-full bg-cyan-500 shadow-[0_0_10px_#00f2ff] transition-all duration-300" style="width: 50%;"></div>
        </div>
        <div class="absolute top-4 left-4 bg-black/60 backdrop-blur-md px-3 py-1 font-mono text-[10px] border border-cyan-500/30">
            IMG_SEQ://<span id="counter">1/2</span>
        </div>
    </div>

    <div class="p-6">
        <div class="animate-pulse-slow border-l-4 border-cyan-500 pl-4 mb-8 bg-gradient-to-r from-cyan-500/5 to-transparent py-2">
            <h1 class="text-3xl font-bold text-white uppercase tracking-tighter mb-1" style="font-family: 'Orbitron';">Hot Single Men</h1>
            <p class="text-cyan-400 font-black text-xl italic tracking-widest">FREE_ACCESS</p>
        </div>

        <div class="grid grid-cols-1 gap-3 text-xs font-mono">
            <div class="bg-cyan-950/10 p-4 flex justify-between items-center border border-cyan-900/30 hover:bg-cyan-500/5 transition-colors">
                <span class="opacity-50 uppercase flex items-center gap-2"><i class="fa-solid fa-location-crosshairs"></i> Coordinates</span>
                <span class="text-white font-bold tracking-widest">Tbon Mek, Sefrou</span>
            </div>
            <div class="bg-cyan-950/10 p-4 flex justify-between items-center border border-cyan-900/30">
                <span class="opacity-50 uppercase flex items-center gap-2"><i class="fa-solid fa-clock-rotate-left"></i> Last Sync</span>
                <span class="text-white font-bold">03:00:00 AGO</span>
            </div>
        </div>
    </div>

    <div class="fixed bottom-0 left-0 right-0 bg-black/95 p-4 border-t border-cyan-900/50 flex items-center justify-between z-50 backdrop-blur-lg">
        <div class="flex items-center gap-3 group cursor-pointer">
            <div class="w-12 h-12 octo-badge bg-cyan-900/20 border border-cyan-500/50 flex items-center justify-center group-hover:bg-cyan-500/20 transition-all">
                <i class="fa-solid fa-ghost text-cyan-400 text-lg"></i>
            </div>
            <div>
                <p class="text-[9px] opacity-40 font-mono tracking-tighter">DATA_NODE</p>
                <p class="text-sm font-bold text-white tracking-widest uppercase">IyadKh</p>
            </div>
        </div>
        
        <div class="flex gap-2">
            <a href="https://wa.me/212000000000" class="hex-btn bg-black border border-cyan-900 w-12 h-12 flex items-center justify-center text-cyan-400 hover:text-white hover:border-cyan-400 transition-all shadow-inner">
                <i class="fa-brands fa-whatsapp text-xl"></i>
            </a>
            <a href="tel:00212000000000" class="hex-btn bg-cyan-500 text-black px-8 h-12 flex items-center gap-2 font-black uppercase tracking-tighter hover:bg-white transition-all">
                <i class="fa-solid fa-bolt-lightning animate-bounce"></i> Establish
            </a>
        </div>
    </div>

    <script>
        const slider = document.getElementById('slider');
        const counter = document.getElementById('counter');
        const homeMenu = document.getElementById('home-menu');
        const progressBar = document.getElementById('progress-bar');

        slider.addEventListener('scroll', () => {
            const index = Math.round(slider.scrollLeft / slider.clientWidth) + 1;
            counter.innerText = `${index}/2`;
            const scrollPercent = (index / 2) * 100;
            progressBar.style.width = `${scrollPercent}%`;
        });

        function closeMenu() {
            homeMenu.classList.add('hidden-menu');
        }

        function openMenu() {
            homeMenu.classList.remove('hidden-menu');
        }
    </script>
</body>
</html>
